name: Publish GitHub Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish package bundle to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out this repo
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build Python package bundle
        run: uv build

      - name: Resolve package metadata
        id: meta
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/annihilate-llm"
          CREATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED" >> "$GITHUB_OUTPUT"

      - name: Upload wheel and source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: annihilate-llm-${{ steps.meta.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build package bundle image
        run: |
          docker build \
            --label "org.opencontainers.image.title=annihilate-llm" \
            --label "org.opencontainers.image.description=Python wheel and source distribution bundle" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --label "org.opencontainers.image.created=${{ steps.meta.outputs.created }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.licenses=AGPL-3.0-or-later" \
            --tag "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            --tag "${{ steps.meta.outputs.image }}:latest" \
            -f - . <<'DOCKERFILE'
          FROM scratch
          COPY dist/ /packages/
          DOCKERFILE

      - name: Push package bundle image
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
