name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: annihilate
            asset_name: annihilate-linux
          - os: windows-latest
            artifact_name: annihilate.exe
            asset_name: annihilate-windows.exe
          - os: macos-latest
            artifact_name: annihilate
            asset_name: annihilate-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build TUI
        working-directory: ./tui
        run: cargo build --release

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: tui/target/release/${{ matrix.artifact_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/annihilate-linux/annihilate-linux
            artifacts/annihilate-windows.exe/annihilate-windows.exe
            artifacts/annihilate-macos/annihilate-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
