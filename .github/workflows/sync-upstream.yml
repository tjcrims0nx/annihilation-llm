name: Sync from upstream (heretic)

on:
  schedule:
    # Check for upstream changes every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    name: Copy upstream code to this repo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/p-e-w/heretic.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Determine upstream default branch
        id: upstream-branch
        run: |
          DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          echo "branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Sync code from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch .
          git checkout upstream/${{ steps.upstream-branch.outputs.branch }} -- .
          git checkout HEAD -- .github
          if git diff --cached --quiet; then
            echo "No upstream changes to sync."
          else
            git commit -m "Sync code from upstream"
          fi

      - name: Push to origin
        run: git push origin HEAD:main
